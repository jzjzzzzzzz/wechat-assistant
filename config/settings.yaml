dry_run: true
allow_real_send: false
test_contact: "文件传输助手"
test_message: "WeChat Assistant test message"

# Contacts allowed for real sending (in addition to 文件传输助手).
# Add a contact's WeChat display name / remark here to enable real sends to them.
# Real sending still requires dry_run: false AND allow_real_send: true.
allowed_real_contacts:
  - "File Transfer"
  - "文件传输助手"

wechat_app_name: "WeChat"
screenshot_dir: "screenshots"
log_file: "logs/app.log"
database_path: "data/wechat_assistant.sqlite3"
audit_enabled: true
ocr_engine: "easyocr"
ocr_confidence_threshold: 0.3
search_delay_seconds: 1.5
send_delay_seconds: 1.0
ui_action_interval_seconds: 0.2
require_known_screen_state_for_real_send: true
vision_template_threshold: 0.85
max_retry: 3

auto_reply:
  enabled: false
  dry_run: true
  delay_minutes: 5
  poll_interval_seconds: 5
  cooldown_minutes: 60
  state_stale_minutes: 1440
  private_only: true
  reply_message: "号主不在线～ AI自动回复的"
  detection_priority:
    - "notification_ocr"
    - "unread_chat_scan"
  allowed_test_contacts:
    - "文件传输助手"
  require_private_chat_whitelist: true
  private_chat_whitelist:
    - "爱"
  blocklist_keywords:
    - "群聊"
    - "群"
    - "服务通知"
    - "订阅号"
    - "公众号"
    - "微信支付"
    - "微信团队"
  non_private_keywords:
    - "Official Accounts"
    - "Service Accounts"
    - "Weixin Games"
    - "WeChat Pay"
    - "WeChat Team"
    - "Subscriptions"
    - "Subscription"
    - "公众号"
    - "订阅号"
    - "服务通知"
    - "微信支付"
    - "微信团队"
  min_ocr_confidence: 0.65

owner:
  status_default: "online"
  offline_reply_immediate: true
  status_menu_enabled: true

unread_scan:
  enable_scroll_scan: false
  max_scroll_pages: 5
  scroll_amount: -5
  scroll_pause_seconds: 0.5
  restore_position_after_scan: true
  stop_on_first_private_candidate: true
  ignore_public_accounts: true
  ignore_service_accounts: true
  ignore_group_chats: true

background_scan:
  enabled: true
  prefer_background_capture: true
  allow_activate_wechat_fallback: false
  require_screenshot_verification: true
  verifier_min_confidence: 0.70
  debug_screenshot_dir: "screenshots/background_scan"
  max_scan_interval_seconds: 30
